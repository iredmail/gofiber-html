name: Run unittests.
on: [push]
jobs:
  build:
    runs-on: ubuntu-26.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - uses: actions/setup-go@v6
      with:
          #go-version: stable
          #go-version: '>=1.26.3'
          go-version: '>=1.27.0-rc.1'

    - run: go test ./...

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
          # 使用 Go rc 版本时才使用 `goinstall` 模式。
          install-mode: goinstall
          version: latest
          args: --config=$GITHUB_WORKSPACE/.golangci.yml

    - id: govulncheck
      uses: golang/govulncheck-action@v1
      with:
          go-version-input: '>=1.27.0-rc.1'

